name: GV_Nest CI/CD Pipeline

on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli

      - name: Install SFDX Git Delta
        run: |
          echo y | sf plugins install sfdx-git-delta

      - name: Authenticate Org
        shell: bash
        run: |
          echo "${{ secrets.GV_NEST_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias Gv_Nest
          sf org list

      - name: Generate Delta Package
        run: |
          mkdir -p delta
          sf sgd source delta \
            --from origin/${{ github.event.pull_request.base.ref }} \
            --to HEAD \
            --output-dir delta

      - name: Detect Metadata and Destructive Changes
        id: change_detector
        shell: bash
        run: |
          # Check for Apex
          if find delta -type f \( -name "*.cls" -o -name "*.trigger" \) | grep -q .; then
            echo "apex=true" >> $GITHUB_OUTPUT
          else
            echo "apex=false" >> $GITHUB_OUTPUT
          fi

          # Check if package.xml contains any elements to deploy
          if grep -q "<types>" delta/package/package.xml; then
            echo "constructive=true" >> $GITHUB_OUTPUT
          else
            echo "constructive=false" >> $GITHUB_OUTPUT
          fi

          # Check if destructive xml contains elements to delete
          if [ -f delta/destructiveChanges/destructiveChanges.xml ] && grep -q "<types>" delta/destructiveChanges/destructiveChanges.xml; then
            echo "destructive=true" >> $GITHUB_OUTPUT
          else
            echo "destructive=false" >> $GITHUB_OUTPUT
          fi

      - name: Set Test Level
        id: tests
        run: |
          if [ "${{ steps.change_detector.outputs.apex }}" = "true" ]; then
            echo "level=RunRelevantTests" >> $GITHUB_OUTPUT
          else
            echo "level=RunLocalTests" >> $GITHUB_OUTPUT
          fi

      # Case 1: Deploy BOTH New Changes and Destructive Changes together
      - name: Validate Combined Deployment
        if: steps.change_detector.outputs.constructive == 'true' && steps.change_detector.outputs.destructive == 'true'
        run: |
          sf project deploy validate \
            --manifest delta/package/package.xml \
            --post-destructive-changes delta/destructiveChanges/destructiveChanges.xml \
            --target-org Gv_Nest \
            --test-level ${{ steps.tests.outputs.level }} \
            --wait 60

      - name: Execute Combined Deployment
        if: steps.change_detector.outputs.constructive == 'true' && steps.change_detector.outputs.destructive == 'true'
        run: |
          sf project deploy start \
            --manifest delta/package/package.xml \
            --post-destructive-changes delta/destructiveChanges/destructiveChanges.xml \
            --target-org Gv_Nest \
            --wait 60

      # Case 2: Constructive ONLY Changes (No Deletions)
      - name: Validate Constructive Only Deployment
        if: steps.change_detector.outputs.constructive == 'true' && steps.change_detector.outputs.destructive == 'false'
        run: |
          sf project deploy validate \
            --manifest delta/package/package.xml \
            --target-org Gv_Nest \
            --test-level ${{ steps.tests.outputs.level }} \
            --wait 60

      - name: Execute Constructive Only Deployment
        if: steps.change_detector.outputs.constructive == 'true' && steps.change_detector.outputs.destructive == 'false'
        run: |
          sf project deploy start \
            --manifest delta/package/package.xml \
            --target-org Gv_Nest \
            --wait 60

      # Case 3: Destructive ONLY Changes (The fix for your current problem)
      - name: Validate Destructive Only Deployment
        if: steps.change_detector.outputs.constructive == 'false' && steps.change_detector.outputs.destructive == 'true'
        run: |
          sf project deploy validate \
            --manifest delta/package/package.xml \
            --post-destructive-changes delta/destructiveChanges/destructiveChanges.xml \
            --target-org Gv_Nest \
            --test-level ${{ steps.tests.outputs.level }} \
            --wait 60

      - name: Execute Destructive Only Deployment
        if: steps.change_detector.outputs.constructive == 'false' && steps.change_detector.outputs.destructive == 'true'
        run: |
          sf project deploy start \
            --manifest delta/package/package.xml \
            --post-destructive-changes delta/destructiveChanges/destructiveChanges.xml \
            --target-org Gv_Nest \
            --wait 60

      - name: Auto Merge Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --merge \
            --delete-branch

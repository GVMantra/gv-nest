name: Salesforce CD (Direct Deploy on Merge)

on:
  push:
    branches:
      - develop

jobs:
  deploy_develop:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: gv-nest-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout Repository (Full History)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli

      - name: Install SFDX Git Delta
        run: |
          echo y | sf plugins install sfdx-git-delta

      - name: Authenticate Org
        shell: bash
        run: |
          echo "${{ secrets.GV_NEST_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias Gv_Nest
          sf org list

      - name: Generate Delta Package
        run: |
          mkdir delta
          sf sgd source delta \
            --from ${{ github.event.before }} \
            --to HEAD \
            --output-dir delta

      - name: Detect Changes Type
        id: change_detector
        shell: bash
        run: |
          if grep -q "<types>" delta/package/package.xml; then
            echo "constructive=true" >> $GITHUB_OUTPUT
          else
            echo "constructive=false" >> $GITHUB_OUTPUT
          fi
          
          if [ -f "delta/destructiveChanges/destructiveChanges.xml" ] && grep -q "<types>" delta/destructiveChanges/destructiveChanges.xml; then
            echo "destructive=true" >> $GITHUB_OUTPUT
          else
            echo "destructive=false" >> $GITHUB_OUTPUT
          fi

      # Case 1: Both Constructive AND Destructive Changes Exist (Uses delta manifest)
      - name: Execute Combined Deployment
        if: steps.change_detector.outputs.constructive == 'true' && steps.change_detector.outputs.destructive == 'true'
        run: |
          sf project deploy start \
            --manifest delta/package/package.xml \
            --post-destructive-changes delta/destructiveChanges/destructiveChanges.xml \
            --target-org Gv_Nest \
            --wait 60

      # Case 2: Constructive ONLY Changes (No Deletions)
      # MODIFIED: Now uses --source-dir force-app to deploy the whole branch
      - name: Execute Constructive Only Deployment
        if: steps.change_detector.outputs.constructive == 'true' && steps.change_detector.outputs.destructive == 'false'
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org Gv_Nest \
            --wait 60

      # Case 3: Destructive ONLY Changes (Uses delta manifest)
      - name: Execute Destructive Only Deployment
        if: steps.change_detector.outputs.constructive == 'false' && steps.change_detector.outputs.destructive == 'true'
        run: |
          sf project deploy start \
            --manifest delta/package/package.xml \
            --post-destructive-changes delta/destructiveChanges/destructiveChanges.xml \
            --target-org Gv_Nest \
            --wait 60

      - name: No Changes Detected
        if: steps.change_detector.outputs.constructive == 'false' && steps.change_detector.outputs.destructive == 'false'
        run: |
          echo "=========================================================="
          echo "INFO: No Salesforce metadata changes or deletions detected."
          echo "Skipping deployment execution safely."
          echo "=========================================================="

      - name: Notify on Deploy Failure
        if: failure()
        run: |
          echo "=========================================================="
          echo "🚨 CRITICAL ERROR: Deploy to Gv_Nest failed after merge!"
          echo "The develop branch and the target Salesforce Org are now OUT OF SYNC."
          echo "Please review the logs above immediately."
          echo "=========================================================="

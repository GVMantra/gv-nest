name: Salesforce CI/CD (Deploy then Merge)

on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened]

jobs:
  deploy_and_merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: gv-nest-deploy-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      # Pinned to the actual PR head commit, NOT the default merge-ref.
      # actions/checkout on a pull_request event defaults to refs/pull/<N>/merge,
      # which GitHub only recomputes on certain PR events and can be stale relative
      # to origin/develop's current tip -- that staleness is what caused the
      # original "NothingToDeploy" bug (empty delta despite real changes in the PR).
      - name: Checkout Repository (Full History)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      # Install CLI Tools
      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli

      - name: Install SFDX Git Delta
        run: |
          echo y | sf plugins install sfdx-git-delta

      # Authenticate using your org auth URL secret
      - name: Authenticate Org
        shell: bash
        run: |
          echo "${{ secrets.GV_NEST_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias Gv_Nest
          sf org list

      # Compares the incoming PR branch (HEAD, pinned above) against the target branch (develop)
      - name: Generate Delta Package
        run: |
          mkdir delta
          sf sgd source delta \
            --from origin/develop \
            --to HEAD \
            --output-dir delta

      # Inspects the delta generation to set the conditional flags
      - name: Detect Changes Type
        id: change_detector
        shell: bash
        run: |
          # Check for constructive changes (additions/updates)
          if grep -q "<types>" delta/package/package.xml; then
            echo "constructive=true" >> $GITHUB_OUTPUT
          else
            echo "constructive=false" >> $GITHUB_OUTPUT
          fi

          # Check for destructive changes (deletions)
          if [ -f "delta/destructiveChanges/destructiveChanges.xml" ] && grep -q "<types>" delta/destructiveChanges/destructiveChanges.xml; then
            echo "destructive=true" >> $GITHUB_OUTPUT
          else
            echo "destructive=false" >> $GITHUB_OUTPUT
          fi

      # Case 1: Both Constructive AND Destructive Changes Exist
      - name: Execute Combined Deployment
        if: steps.change_detector.outputs.constructive == 'true' && steps.change_detector.outputs.destructive == 'true'
        run: |
          sf project deploy start \
            --manifest delta/package/package.xml \
            --post-destructive-changes delta/destructiveChanges/destructiveChanges.xml \
            --target-org Gv_Nest \
            --wait 60

      # Case 2: Constructive ONLY Changes (No Deletions)
      - name: Execute Constructive Only Deployment
        if: steps.change_detector.outputs.constructive == 'true' && steps.change_detector.outputs.destructive == 'false'
        run: |
          sf project deploy start \
            --manifest delta/package/package.xml \
            --target-org Gv_Nest \
            --wait 60

      # Case 3: Destructive ONLY Changes (Handling empty package.xml errors)
      - name: Execute Destructive Only Deployment
        if: steps.change_detector.outputs.constructive == 'false' && steps.change_detector.outputs.destructive == 'true'
        run: |
          sf project deploy start \
            --manifest delta/package/package.xml \
            --post-destructive-changes delta/destructiveChanges/destructiveChanges.xml \
            --target-org Gv_Nest \
            --wait 60

      # Fallback log handling for non-metadata changes (README updates, etc.)
      - name: No Changes Detected
        if: steps.change_detector.outputs.constructive == 'false' && steps.change_detector.outputs.destructive == 'false'
        run: |
          echo "=========================================================="
          echo "INFO: No Salesforce metadata changes or deletions detected."
          echo "Skipping deployment execution safely."
          echo "=========================================================="

      # Final Step: If all deployment steps above succeed, the PR is merged.
      # Uses the default secrets.GITHUB_TOKEN -- this won't trigger another workflow
      # run, which is fine here since deployment already happened before this step.
      - name: Auto Merge Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --merge \
            --delete-branch \
            --repo ${{ github.repository }}